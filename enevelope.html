<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surat Untukmu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(
135deg,
#FFE4EC,
#FFF8D6
);

height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

h2{

font-family:'Playfair Display',serif;

color:#5c4b51;

margin-bottom:15px;
}

p{

color:#6d5c63;

margin-bottom:25px;
}

.envelope{

position:relative;

width:300px;
height:200px;

cursor:pointer;

transition:.5s;
}

.envelope:hover{

transform:scale(1.05);
}

.base{

position:absolute;

bottom:0;

width:100%;
height:100%;

background:#f7c8d8;

border-radius:10px;
}

.flap{

position:absolute;

top:0;

width:0;
height:0;

border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:110px solid #f3b7ca;

transform-origin:top;

transition:1s;
}

.seal{

position:absolute;

top:80px;
left:130px;

font-size:35px;

transition:.5s;
}

.letter{

position:absolute;

left:25px;
top:70px;

width:250px;
height:160px;

background:white;

border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

font-size:1.2rem;

box-shadow:
0 10px 20px rgba(0,0,0,.1);

transform:translateY(60px);

transition:1.5s;
}

.open .flap{

transform:rotateX(180deg);
}

.open .seal{

opacity:0;
}

.open .letter{

transform:translateY(-120px);
}

.readBtn{

display:none;

margin-top:50px;

padding:14px 30px;

border:none;

border-radius:50px;

background:#F7C8D8;

font-weight:bold;

cursor:pointer;
}

.readBtn:hover{

background:#FFE082;
}

.petal{

position:absolute;

top:-30px;

font-size:20px;

animation:fall linear forwards;
}

@keyframes fall{

to{

transform:
translateY(110vh)
rotate(360deg);

}
}

</style>
</head>

<body>

<h2>
there's somehting waiting.
</h2>

<p>
(klik 🌸)
</p>

<div class="envelope" id="envelope">

<div class="letter">
💌
</div>

<div class="flap"></div>

<div class="base"></div>

<div class="seal">
💛
</div>

</div>

<button
class="readBtn"
id="readBtn">

📜 Baca Surat

</button>

<script>

const envelope =
document.getElementById("envelope");

const readBtn =
document.getElementById("readBtn");

envelope.onclick = ()=>{

envelope.classList.add("open");

setTimeout(()=>{

readBtn.style.display="block";

},1500);

};

readBtn.onclick = ()=>{

window.location.href =
"letter1.html";

};

function createPetal(){

const petal =
document.createElement("div");

petal.classList.add("petal");

petal.innerHTML="🌸";

petal.style.left =
Math.random()*100+"vw";

petal.style.animationDuration =
(Math.random()*5+5)+"s";

document.body.appendChild(petal);

setTimeout(()=>{

petal.remove();

},10000);

}

setInterval(createPetal,700);

</script>

</body>
</html>
